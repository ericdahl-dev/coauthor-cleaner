name: Coauthor Cleaner
description: Scan pull requests for unwanted AI attribution markers
branding:
  icon: shield
  color: purple

inputs:
  mode:
    description: block (fail on findings) or warn (comment only)
    required: false
    default: block
  version:
    description: coauthor-cleaner version to install (e.g. v0.1.0); leave empty to build from source
    required: false
    default: ""
  strict:
    description: Only high-confidence patterns
    required: false
    default: "false"
  aggressive:
    description: Broader pattern matching
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install coauthor-cleaner
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VERSION="${{ inputs.version }}"
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in x86_64) ARCH=amd64;; aarch64|arm64) ARCH=arm64;; esac
          URL="https://github.com/Skeyelab/coauthor-cleaner/releases/download/${VERSION}/coauthor-cleaner_${VERSION#v}_${OS}_${ARCH}.tar.gz"
          curl -sL "$URL" | tar xz
          echo "$PWD" >> "$GITHUB_PATH"
        else
          go build -o coauthor-cleaner ./cmd/coauthor-cleaner
          echo "$PWD" >> "$GITHUB_PATH"
        fi
      env:
        CGO_ENABLED: "0"

    - name: Scan PR
      id: scan
      shell: bash
      run: |
        set +e
        ARGS="--base ${{ github.event.pull_request.base.sha }} --head ${{ github.event.pull_request.head.sha }} --mode ${{ inputs.mode }} --report-file findings.json --comment-file pr-comment.md"
        if [ "${{ inputs.strict }}" = "true" ]; then ARGS="$ARGS --strict"; fi
        if [ "${{ inputs.aggressive }}" = "true" ]; then ARGS="$ARGS --aggressive"; fi
        coauthor-cleaner ci $ARGS
        code=$?
        count=0
        if [ -f findings.json ]; then count=$(jq -r '.count' findings.json); fi
        echo "count=$count" >> "$GITHUB_OUTPUT"
        if [ "${{ inputs.mode }}" = "warn" ]; then exit 0; fi
        exit $code

    - name: Comment on PR
      if: steps.scan.outputs.count != '0' && inputs.mode == 'warn'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh pr comment "${{ github.event.pull_request.number }}" --body-file pr-comment.md
